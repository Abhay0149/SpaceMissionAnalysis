<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🚀 Space Mission Control Center</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Orbitron',sans-serif;
background-size:cover;
background-position:center 35%;
background-repeat:no-repeat;
}

/* GLASS EFFECT */

.glass{
background: rgba(255,255,255,0.06);
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);

border:1px solid rgba(255,255,255,0.12);

box-shadow:
0 10px 40px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.15);

transition: all 0.35s ease;
}


/* HOVER */

.card-hover:hover{
transform: translateY(-6px) scale(1.02);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}


/* BUTTON */

.glass-button{

background: rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);

backdrop-filter: blur(15px);

color:white;

box-shadow:
0 6px 18px rgba(0,0,0,0.45);

transition: all 0.3s ease;

}

.glass-button:hover{

background: rgba(255,255,255,0.12);

transform: translateY(-2px);

box-shadow:
0 10px 28px rgba(0,0,0,0.55);

}


/* INPUT */

.glass-input{

background: rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);

color:white;

backdrop-filter: blur(15px);

}

.glass-input::placeholder{
color: rgba(255,255,255,0.6);
}


/* FIXED CHART */

.chart-container{

height:340px;
width:100%;

background: rgba(255,255,255,0.015);

border-radius:16px;

padding:10px;

border:1px solid rgba(255,255,255,0.05);

backdrop-filter: blur(20px);

}

</style>

</head>


<body class="text-white min-h-screen relative bg-cover bg-fixed"
style="background-image: url('image/red-astronaut.jpg');">


<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-red-900/30 to-black/60"></div>


<div class="relative z-10">


<header class="text-center py-6 border-b border-white/10 backdrop-blur-xl">

<h1 class="text-3xl md:text-4xl font-bold">
🚀 Space Mission Control Center
</h1>

<p class="text-slate-300 mt-2 text-lg">
AI Powered Mission Monitoring Dashboard
</p>

</header>


<section class="grid md:grid-cols-3 gap-8 px-10 mt-12">


<div class="glass card-hover p-10 rounded-3xl text-center">
<h2 class="text-slate-300 mb-2">Total Missions</h2>
<p id="missions" class="text-4xl font-bold text-green-400">Loading...</p>
</div>


<div class="glass card-hover p-10 rounded-3xl text-center">
<h2 class="text-slate-300 mb-2">Average Payload</h2>
<p id="payload" class="text-4xl font-bold text-blue-400">Loading...</p>
</div>


<div class="glass card-hover p-10 rounded-3xl text-center">
<h2 class="text-slate-300 mb-2">Success Rate</h2>
<p id="success" class="text-4xl font-bold text-purple-400">Loading...</p>
</div>


</section>



<section class="flex justify-center mt-16 px-6">

<div class="glass p-10 rounded-3xl w-full max-w-md text-center">


<h2 class="text-2xl mb-6 font-semibold">
🤖 Mission Success Predictor
</h2>


<input id="payloadInput" type="number"
placeholder="Enter Payload Weight (tons)"
class="glass-input w-full p-3 rounded-lg mb-5">


<button onclick="predictMission()"
class="glass-button px-8 py-3 rounded-xl font-semibold w-full">

Predict Mission

</button>


<p id="prediction" class="mt-5 text-lg font-semibold"></p>

</div>

</section>



<section class="flex justify-center px-10 mt-20 pb-20">

<div class="glass p-10 rounded-3xl w-full max-w-5xl">

<h3 class="text-2xl mb-8 text-center font-semibold">
📊 Mission Types Distribution
</h3>


<div class="chart-container">
<canvas id="missionChart"></canvas>
</div>

</div>

</section>


</div>



<script>

fetch("/summary")
.then(res=>res.json())
.then(data=>{

document.getElementById("missions").innerText=data.total_missions
document.getElementById("payload").innerText=data.avg_payload+" Tons"
document.getElementById("success").innerText=data.avg_success+"%"

})


fetch("/mission-types")
.then(res=>res.json())
.then(data=>{

let labels=[]
let values=[]

data.forEach(item=>{
labels.push(item.name)
values.push(item.count)
})

const ctx=document.getElementById("missionChart").getContext("2d")

new Chart(ctx,{

type:"line",

data:{
labels:labels,
datasets:[{

label:"Mission Types",

data:values,

borderColor:"#ff6b6b",

backgroundColor:"rgba(255,107,107,0.08)",

tension:0.45,

fill:true,

borderWidth:3,

pointBackgroundColor:"#ff6b6b",

pointRadius:5,

pointHoverRadius:7

}]
},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{
legend:{
labels:{color:"white"}
}
},

scales:{

x:{
ticks:{color:"rgba(255,255,255,0.8)"},
grid:{color:"rgba(255,255,255,0.05)"}
},

y:{
ticks:{color:"rgba(255,255,255,0.8)"},
grid:{color:"rgba(255,255,255,0.05)"},
beginAtZero:true
}

}

}

})

})


function predictMission(){

let payload=document.getElementById("payloadInput").value
let result=document.getElementById("prediction")

if(payload===""){
result.innerText="⚠️ Enter payload weight"
return
}

result.innerText="🤖 AI analyzing mission..."

fetch("/predict/"+Number(payload))

.then(response=>response.json())

.then(data=>{

result.innerHTML=
data.status+
"<br><span style='color:#22c55e'>Success: "+data.success+"%</span>"+
"<br><span style='color:#ef4444'>Failure: "+data.failure+"%</span>"

})

.catch(error=>{

console.log(error)

result.innerText="❌ Server connection error"

})

}

</script>

</body>
</html>
